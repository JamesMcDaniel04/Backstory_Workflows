<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Opportunity Insights Guide</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #f6f4ef;
      --text: #173042;
      --muted: #5e7f93;
      --panel: #ffffff;
      --border: rgba(23, 48, 66, 0.12);
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background:
        radial-gradient(circle at top left, rgba(120, 164, 191, 0.2), transparent 38%),
        linear-gradient(180deg, #f9f8f5 0%, var(--bg) 100%);
      color: var(--text);
      font: 16px/1.5 "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    }

    .shell {
      width: min(720px, calc(100vw - 32px));
      padding: 28px 24px;
      border: 1px solid var(--border);
      border-radius: 20px;
      background: rgba(255, 255, 255, 0.92);
      box-shadow: 0 18px 50px rgba(23, 48, 66, 0.08);
    }

    h1 {
      margin: 0 0 10px;
      font-size: 28px;
      line-height: 1.1;
    }

    p {
      margin: 0;
      color: var(--muted);
    }

    .status {
      margin-top: 18px;
      display: inline-flex;
      align-items: center;
      gap: 10px;
      padding: 10px 14px;
      border-radius: 999px;
      background: #edf5f8;
      color: var(--text);
      font-size: 14px;
      font-weight: 600;
    }

    .status::before {
      content: "";
      width: 10px;
      height: 10px;
      border-radius: 999px;
      background: #5f92ad;
      animation: pulse 1.2s ease-in-out infinite;
    }

    .actions {
      margin-top: 18px;
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
    }

    .actions a {
      color: #305e79;
      font-weight: 600;
      text-decoration: none;
    }

    .actions a:hover {
      text-decoration: underline;
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; transform: scale(1); }
      50% { opacity: 0.45; transform: scale(0.88); }
    }
  </style>
</head>
<body>
  <div class="shell">
    <h1>Loading Opportunity Insights Guide</h1>
    <p>
      Mirroring the current deployment guide from Backstory Studio so this project
      shows the same content locally.
    </p>
    <div class="status">Syncing remote guide content</div>
    <div class="actions">
      <a href="../#/">Automation Library</a>
      <a href="../skills/#/">LLM Skills Library</a>
      <a href="https://shreyasgore-pai.github.io/BackstoryStudio/opp-insights-guide/#overview">Open source guide</a>
    </div>
  </div>

  <script>
    (function () {
      const GUIDE_URL = 'https://shreyasgore-pai.github.io/BackstoryStudio/opp-insights-guide/';
      const guideHash = location.hash || '#overview';

      function injectMirror(html) {
        const baseTag = `<base href="${GUIDE_URL}">`;
        const syncScript = `
<script>
window.addEventListener('load', () => {
  const hash = window.location.hash;
  if (hash) {
    const target = document.querySelector(hash);
    if (target) target.scrollIntoView();
  }
});
<\/script>`;
        const withBase = html.replace(/<head([^>]*)>/i, `<head$1>${baseTag}`);
        const withSync = withBase.includes('</body>')
          ? withBase.replace('</body>', `${syncScript}</body>`)
          : `${withBase}${syncScript}`;
        document.open();
        document.write(withSync);
        document.close();
        if (guideHash && guideHash !== '#overview') {
          location.hash = guideHash;
        }
      }

      fetch(`${GUIDE_URL}${guideHash}`, { mode: 'cors' })
        .then((response) => {
          if (!response.ok) {
            throw new Error(`Failed to load guide: ${response.status}`);
          }
          return response.text();
        })
        .then(injectMirror)
        .catch((error) => {
          console.error(error);
          document.querySelector('.shell').innerHTML = `
            <h1>Opportunity Insights Guide Unavailable</h1>
            <p>
              The mirrored guide could not be loaded right now. You can still open the
              source guide directly while the local mirror is unavailable.
            </p>
            <div class="actions" style="margin-top:18px;">
              <a href="${GUIDE_URL}${guideHash}">Open source guide</a>
              <a href="../#/">Automation Library</a>
              <a href="../skills/#/">LLM Skills Library</a>
            </div>`;
        });
    }());
  </script>
</body>
</html>
